name: CI

# Runs the three required checks on every PR (and on pushes to main).
# Branch protection should require the "js-tests", "python-tests", and "lint"
# jobs to pass before merge — that is what blocks merge on failure.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint

  js-tests:
    name: js-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # python3 is needed by tests/parity.test.js, which runs the zero-dependency
      # CLI as a subprocess and compares its output to the JS core.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm install
      - run: npm test

  python-tests:
    name: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: pytest
